version: "3.9"

services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    build: .
    command: ./migrator
    environment:
      DB_URL: postgres://user:password@db:5432/app?sslmode=disable
    depends_on:
      - db

  app:
    build: .
    command: ./app
    environment:
      DB_URL: postgres://user:password@db:5432/app?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - migrator

volumes:
  db_data: